<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/css/jungle.css">
<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Zoo — Animal Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a1a0e;--sidebar:#0d2414;--card:#0f2818;--gold:#c9a84c;--gold-light:#e8c86e;--cream:#f5ead5;--white:#faf7f0;--green:#2d6e3e;--muted:#8a9e8e;--danger:#c0392b;--border:rgba(201,168,76,0.15);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Crimson Pro',serif;background:var(--bg);color:var(--white);display:flex;min-height:100vh;}
  .sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
  .sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);}
  .sidebar-logo h2{font-family:'Playfair Display',serif;background:linear-gradient(135deg,#c9a84c,#e8c86e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.3rem;}
  .sidebar-logo p{color:var(--muted);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .nav{flex:1;padding:16px 0;}
  .nav-section{padding:8px 20px;color:var(--muted);font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;margin-top:8px;}
  .nav a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--muted);text-decoration:none;transition:all 0.2s;font-size:0.95rem;border-left:3px solid transparent;}
  .nav a:hover,.nav a.active{color:var(--white);background:rgba(201,168,76,0.08);border-left-color:var(--gold);}
  .nav a.active{color:var(--gold-light);}
  .nav a .icon{width:20px;text-align:center;font-size:1.1rem;}
  .sidebar-user{padding:16px 20px;border-top:1px solid var(--border);}
  .user-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--green));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:var(--bg);}
  .user-info{display:flex;align-items:center;gap:10px;}
  .user-name{font-size:0.9rem;color:var(--cream);}
  .user-role{font-size:0.75rem;color:var(--muted);text-transform:uppercase;}
  .main{margin-left:260px;flex:1;padding:28px;min-height:100vh;}
  .back{color:var(--gold);text-decoration:none;display:flex;align-items:center;gap:6px;font-size:0.9rem;margin-bottom:20px;transition:all 0.2s;}
  .back:hover{gap:10px;}
  .hero{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;}
  .hero-media{border-radius:20px;overflow:hidden;background:var(--card);border:1px solid var(--border);position:relative;}
  .hero-media img{width:100%;height:360px;object-fit:cover;display:block;}
  .hero-media .ph{width:100%;height:360px;background:linear-gradient(135deg,#1a3d22,#0d2414);display:flex;align-items:center;justify-content:center;font-size:8rem;}
  .media-tabs{display:flex;gap:8px;padding:12px;background:rgba(0,0,0,0.3);position:absolute;bottom:0;left:0;right:0;}
  .mtab{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:var(--white);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem;transition:all 0.2s;}
  .mtab.active,.mtab:hover{background:var(--gold);color:var(--bg);border-color:var(--gold);}
  .hero-info{display:flex;flex-direction:column;gap:16px;}
  .info-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;}
  .animal-title{font-family:'Playfair Display',serif;font-size:2.5rem;color:var(--cream);margin-bottom:4px;}
  .animal-subtitle{color:var(--muted);font-style:italic;font-size:1.1rem;margin-bottom:12px;}
  .badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;}
  .badge.healthy{background:rgba(45,110,62,0.3);color:#7eff90;border:1px solid rgba(45,110,62,0.4);}
  .badge.sick{background:rgba(192,57,43,0.3);color:#ff7070;border:1px solid rgba(192,57,43,0.4);}
  .badge.recovering{background:rgba(230,126,34,0.3);color:#ffb347;border:1px solid rgba(230,126,34,0.4);}
  .badge.critical{background:rgba(192,57,43,0.5);color:#fff;border:1px solid rgba(192,57,43,0.8);}
  .badge.gold{background:rgba(201,168,76,0.2);color:var(--gold-light);border:1px solid rgba(201,168,76,0.3);}
  .badge.red{background:rgba(192,57,43,0.3);color:#ff7070;border:1px solid rgba(192,57,43,0.4);}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .stat{background:rgba(13,36,20,0.6);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--border);}
  .stat-v{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--gold-light);}
  .stat-l{color:var(--muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .section-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;}
  .panel h3{font-family:'Playfair Display',serif;color:var(--cream);margin-bottom:16px;font-size:1.15rem;}
  .info-list{display:flex;flex-direction:column;gap:10px;}
  .info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
  .info-row:last-child{border-bottom:none;}
  .info-key{color:var(--muted);font-size:0.85rem;}
  .info-val{color:var(--cream);font-size:0.9rem;text-align:right;max-width:60%;}
  .med-item,.visit-item{padding:12px;background:rgba(13,36,20,0.5);border-radius:10px;margin-bottom:10px;border:1px solid var(--border);}
  .med-name{color:var(--cream);font-size:0.95rem;font-weight:600;}
  .med-meta{color:var(--muted);font-size:0.8rem;margin-top:3px;}
  .fun-fact{background:rgba(201,168,76,0.08);border-left:3px solid var(--gold);padding:14px 18px;border-radius:0 10px 10px 0;color:var(--cream);font-style:italic;line-height:1.6;}
  .video-container{width:100%;border-radius:12px;overflow:hidden;background:#000;}
  .video-container video{width:100%;max-height:300px;object-fit:contain;}
  .empty{color:var(--muted);font-size:0.9rem;text-align:center;padding:20px;}
  .visit-form{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
  .vf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .vf input,.vf select,.vf textarea{width:100%;background:rgba(10,26,14,0.7);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--white);font-family:'Crimson Pro',serif;font-size:0.9rem;outline:none;}
  .vf input:focus,.vf select:focus,.vf textarea:focus{border-color:var(--gold);}
  .vf label{display:block;color:var(--gold-light);font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
  .btn-gold{background:linear-gradient(135deg,#c9a84c,#e8c86e);border:none;color:#0a1a0e;padding:10px 22px;border-radius:8px;font-family:'Crimson Pro',serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .btn-gold:hover{transform:translateY(-1px);}
  .toast{position:fixed;bottom:30px;right:30px;background:rgba(45,110,62,0.9);border:1px solid rgba(45,110,62,0.6);color:#fff;padding:14px 22px;border-radius:12px;z-index:9999;transition:all 0.3s;transform:translateY(100px);opacity:0;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.error{background:rgba(192,57,43,0.9);border-color:rgba(192,57,43,0.6);}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo"><h2>🦁 DIGITAL ZOO</h2><p>Admin System</p></div>
  <nav class="nav">
    <div class="nav-section">Main</div>
    <a href="/dashboard"><span class="icon">📊</span> Dashboard</a>
    <a href="/animals" class="active"><span class="icon">🐾</span> Animals</a>
    <a href="/adoptions"><span class="icon">🤝</span> Adoptions</a>
    <a href="/medications"><span class="icon">💊</span> Medical Records</a>
    <div class="nav-section">Management</div>
    <a href="/reports"><span class="icon">📈</span> Reports</a>
  </nav>
  <div class="sidebar-user">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">A</div>
      <div>
        <div class="user-name" id="userName">Loading...</div>
        <div class="user-role" id="userRole">---</div>
      </div>
    </div>
  </div>
</aside>

<main class="main">
  <a href="/animals" class="back">← Back to Animals</a>
  <div id="content">
    <div style="text-align:center;padding:80px;color:var(--muted)">Loading animal data...</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  var token = localStorage.getItem('token');
  var user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = '/login';

  document.getElementById('userName').textContent  = user.name || 'Staff';
  document.getElementById('userRole').textContent  = user.role || 'staff';
  document.getElementById('userAvatar').textContent = (user.name || 'A')[0].toUpperCase();

  var animalId = window.location.pathname.split('/').pop();

  var EMOJI = {
    mammal: '🦁', bird: '🦜', reptile: '🦎',
    fish: '🐟', amphibian: '🐸', invertebrate: '🦋'
  };
  var CONS = {
    LC:'Least Concern', NT:'Near Threatened', VU:'Vulnerable',
    EN:'Endangered', CR:'Critically Endangered', EW:'Extinct in Wild', EX:'Extinct'
  };

  /* ── helpers ─────────────────────────────────────── */
  function h(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function row(k, v) {
    return '<div class="info-row">' +
      '<div class="info-key">'  + h(k) + '</div>' +
      '<div class="info-val">'  + h(v) + '</div>' +
    '</div>';
  }

  /* ── fetch ───────────────────────────────────────── */
  function load() {
    fetch('/api/animals/' + animalId, {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(r){ return r.json(); })
    .then(function(json){
      if (!json.data) throw new Error('empty');
      render(json.data);
    })
    .catch(function(){
      document.getElementById('content').innerHTML =
        '<div style="text-align:center;padding:80px;color:#ff7070">Failed to load animal</div>';
    });
  }

  /* ── render ──────────────────────────────────────── */
  function render(a) {
    document.title = h(a.name) + ' — Digital Zoo';
    var e = EMOJI[a.category] || '🐾';

    /* media area */
    var heroImg = a.image_url
      ? '<img src="' + h(a.image_url) + '" alt="' + h(a.name) + '" id="heroImg">'
      : '<div class="ph">' + e + '</div>';

    var photoTab = a.image_url
      ? '<button class="mtab active" onclick="showMedia(\'image\',event)">📷 Photo</button>' : '';
    var videoTab = a.video_url
      ? '<button class="mtab" onclick="showMedia(\'video\',event)">🎬 Video</button>' : '';

    /* badges */
    var badges =
      '<span class="badge ' + h(a.health_status) + '">' + h(a.health_status) + '</span>' +
      '<span class="badge gold">' + h(a.category) + '</span>' +
      '<span class="badge gold">' + h(a.diet_type) + '</span>' +
      (a.is_endangered ? '<span class="badge red">⚠️ Endangered</span>' : '') +
      (a.conservation_status
        ? '<span class="badge gold">' + h(a.conservation_status) + ': ' + h(CONS[a.conservation_status]) + '</span>'
        : '');

    /* subtitle — safe string concatenation, NO nested backticks */
    var subtitle = h(a.species);
    if (a.scientific_name) subtitle += ' (' + h(a.scientific_name) + ')';

    /* optional blocks */
    var funFactBlock = a.fun_facts
      ? '<div class="info-card"><div class="fun-fact">💡 ' + h(a.fun_facts) + '</div></div>' : '';
    var descBlock = a.description
      ? '<div class="info-card"><p style="color:var(--cream);line-height:1.7;font-size:0.95rem">' + h(a.description) + '</p></div>' : '';

    /* medications */
    var medsHtml = '<div class="empty">No medication records</div>';
    if (a.recent_medications && a.recent_medications.length) {
      medsHtml = a.recent_medications.map(function(m) {
        return '<div class="med-item">' +
          '<div class="med-name">' + h(m.medication_name) + '</div>' +
          '<div class="med-meta">Dosage: ' + h(m.dosage) + ' | ' + h(m.frequency) + '</div>' +
          '<div class="med-meta">Vet: ' + h(m.vet_name) + ' | Status: ' + h(m.status) + '</div>' +
        '</div>';
      }).join('');
    }

    /* visits */
    var visitsHtml = '<div class="empty">No visits recorded</div>';
    if (a.recent_visits && a.recent_visits.length) {
      visitsHtml = a.recent_visits.map(function(v) {
        var obs = v.observations
          ? '<div class="med-meta" style="margin-top:4px">📝 ' + h(v.observations) + '</div>' : '';
        return '<div class="visit-item">' +
          '<div class="med-name">' + h(v.visit_type.replace('_',' ')) + ' visit</div>' +
          '<div class="med-meta">' + new Date(v.visit_date).toLocaleString('en-IN') + ' | ' + h(v.keeper_name) + '</div>' +
          obs +
        '</div>';
      }).join('');
    }

    /* adoptions */
    var adoptHtml = '<div class="empty">No adoptions yet</div>';
    if (a.adoptions && a.adoptions.length) {
      adoptHtml = a.adoptions.map(function(ad) {
        return '<div class="med-item">' +
          '<div class="med-name">' + h(ad.adopter_name) + '</div>' +
          '<div class="med-meta">' + h(ad.adopter_email) + ' | ' + h(ad.adopter_phone) + '</div>' +
          '<div class="med-meta">Since: ' + new Date(ad.adoption_date).toLocaleDateString('en-IN') +
            ' | Status: ' + h(ad.status) + '</div>' +
          '<div class="med-meta" style="color:var(--gold)">🏆 ' + h(ad.certificate_number) + '</div>' +
        '</div>';
      }).join('');
    }

    /* assemble */
    document.getElementById('content').innerHTML =
      /* ── hero ── */
      '<div class="hero">' +
        '<div class="hero-media">' +
          '<div id="mediaDisplay">' + heroImg + '</div>' +
          '<div class="media-tabs">' +
            photoTab + videoTab +
            '<button class="mtab" onclick="playSound(\'' + h(a.category) + '\')">🔊 Sound</button>' +
          '</div>' +
        '</div>' +
        '<div class="hero-info">' +
          '<div class="info-card">' +
            '<div class="animal-title">' + h(a.name) + '</div>' +
            '<div class="animal-subtitle">' + subtitle + '</div>' +
            '<div class="badges">' + badges + '</div>' +
            '<div class="stats-row">' +
              '<div class="stat">' +
                '<div class="stat-v">' + h(a.age)     + '</div>' +
                '<div class="stat-l">' + h(a.age_unit || 'years') + '</div>' +
              '</div>' +
              '<div class="stat">' +
                '<div class="stat-v">' + h(a.weight)  + '</div>' +
                '<div class="stat-l">kg weight</div>' +
              '</div>' +
              '<div class="stat">' +
                '<div class="stat-v">' + h(a.gender)  + '</div>' +
                '<div class="stat-l">gender</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
          funFactBlock +
          descBlock +
        '</div>' +
      '</div>' +

      /* ── details + meds ── */
      '<div class="section-grid">' +
        '<div class="panel">' +
          '<h3>📋 Animal Details</h3>' +
          '<div class="info-list">' +
            row('Origin',           a.origin_country  || '—') +
            row('Acquisition Date', a.acquisition_date ? new Date(a.acquisition_date).toLocaleDateString('en-IN') : '—') +
            row('Acquisition Type', a.acquisition_type || '—') +
            row('Diet Notes',       a.diet_notes       || '—') +
            row('Enclosure',        a.cage_name        || 'Not assigned') +
            row('Zone',             a.zone             || '—') +
            row('Keeper',           a.keeper_name      || 'Not assigned') +
          '</div>' +
        '</div>' +
        '<div class="panel">' +
          '<h3>💊 Recent Medications</h3>' +
          medsHtml +
          '<a href="/medications" style="color:var(--gold);font-size:0.85rem;margin-top:12px;display:inline-block">' +
            '+ Add Medication Record</a>' +
        '</div>' +
      '</div>' +

      /* ── visits + adoptions ── */
      '<div class="section-grid">' +
        '<div class="panel">' +
          '<h3>👁 Recent Visits</h3>' +
          visitsHtml +
          '<div style="margin-top:16px">' +
            '<h4 style="color:var(--gold-light);font-size:0.85rem;letter-spacing:2px;' +
              'text-transform:uppercase;margin-bottom:12px">Log New Visit</h4>' +
            '<div class="visit-form">' +
              '<div class="vf-row">' +
                '<div class="vf"><label>Visit Type</label>' +
                  '<select id="vType">' +
                    '<option value="observation">Observation</option>' +
                    '<option value="feeding">Feeding</option>' +
                    '<option value="health_check">Health Check</option>' +
                    '<option value="grooming">Grooming</option>' +
                    '<option value="training">Training</option>' +
                  '</select>' +
                '</div>' +
                '<div class="vf"><label>Duration (min)</label>' +
                  '<input type="number" id="vDur" placeholder="30"></div>' +
              '</div>' +
              '<div class="vf"><label>Observations</label>' +
                '<textarea id="vObs" placeholder="Notes about behavior, health..."></textarea></div>' +
              '<button class="btn-gold" onclick="logVisit(' + a.id + ')">Log Visit</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="panel">' +
          '<h3>🤝 Adoptions</h3>' +
          adoptHtml +
          '<a href="/adoptions" style="color:var(--gold);font-size:0.85rem;margin-top:12px;display:inline-block">' +
            '+ New Adoption →</a>' +
        '</div>' +
      '</div>';

    window._animalData = a;
  }

  /* ── media toggle ────────────────────────────────── */
  function showMedia(type, event) {
    document.querySelectorAll('.mtab').forEach(function(b){ b.classList.remove('active'); });
    if (event && event.target) event.target.classList.add('active');
    var d = document.getElementById('mediaDisplay');
    var a = window._animalData;
    if (type === 'image') {
      d.innerHTML = a.image_url
        ? '<img src="' + h(a.image_url) + '" alt="' + h(a.name) + '">'
        : '<div class="ph">' + (EMOJI[a.category] || '🐾') + '</div>';
    } else if (type === 'video' && a.video_url) {
      d.innerHTML =
        '<div class="video-container">' +
          '<video controls autoplay>' +
            '<source src="' + h(a.video_url) + '">Your browser does not support video.' +
          '</video>' +
        '</div>';
    }
  }

  /* ── animal sound ────────────────────────────────── */
  function playSound(category) {
    var map = {
      mammal:      [220, 330, 440],
      bird:        [880, 1100, 660],
      reptile:     [110, 150, 90],
      fish:        [200, 180, 220],
      amphibian:   [400, 600, 500],
      invertebrate:[1000, 800, 600]
    };
    var freqs = map[category] || [300, 400, 350];
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    freqs.forEach(function(f, i) {
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = f;
      osc.type = (category === 'bird') ? 'sine' : (category === 'reptile') ? 'sawtooth' : 'triangle';
      gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.3 + 0.8);
      osc.start(ctx.currentTime + i * 0.3);
      osc.stop(ctx.currentTime  + i * 0.3 + 0.8);
    });
    showToast('🔊 Playing animal sound...');
  }

  /* ── log visit ───────────────────────────────────── */
  function logVisit(animalId) {
    var type = document.getElementById('vType').value;
    var dur  = document.getElementById('vDur').value;
    var obs  = document.getElementById('vObs').value;
    fetch('/api/medications/visits', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ animal_id: animalId, visit_type: type, duration_minutes: dur, observations: obs })
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success) {
        showToast('Visit logged!');
        document.getElementById('vObs').value = '';
        document.getElementById('vDur').value = '';
      } else {
        showToast(d.message || 'Failed', 'error');
      }
    })
    .catch(function(){ showToast('Server error', 'error'); });
  }

  /* ── toast ───────────────────────────────────────── */
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || 'success') + ' show';
    setTimeout(function(){ t.classList.remove('show'); }, 3000);
  }

  load();
</script>
</body>
</html>
