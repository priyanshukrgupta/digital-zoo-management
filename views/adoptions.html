<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/jungle.css">
<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Zoo — Adoptions</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a1a0e;--sidebar:#0d2414;--card:#0f2818;--gold:#c9a84c;--gold-light:#e8c86e;--cream:#f5ead5;--white:#faf7f0;--green:#2d6e3e;--muted:#8a9e8e;--danger:#c0392b;--border:rgba(201,168,76,0.15);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Crimson Pro',serif;background:var(--bg);color:var(--white);display:flex;min-height:100vh;}
  .sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
  .sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);}
  .sidebar-logo h2{font-family:'Playfair Display',serif;background:linear-gradient(135deg,#c9a84c,#e8c86e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.3rem;}
  .sidebar-logo p{color:var(--muted);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .nav{flex:1;padding:16px 0;}
  .nav-section{padding:8px 20px;color:var(--muted);font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;margin-top:8px;}
  .nav a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--muted);text-decoration:none;transition:all 0.2s;font-size:0.95rem;border-left:3px solid transparent;}
  .nav a:hover,.nav a.active{color:var(--white);background:rgba(201,168,76,0.08);border-left-color:var(--gold);}
  .nav a.active{color:var(--gold-light);}
  .nav a .icon{width:20px;text-align:center;font-size:1.1rem;}
  .sidebar-user{padding:16px 20px;border-top:1px solid var(--border);}
  .user-info{display:flex;align-items:center;gap:10px;}
  .user-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--green));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:var(--bg);}
  .user-name{font-size:0.9rem;color:var(--cream);}
  .user-role{font-size:0.75rem;color:var(--muted);text-transform:uppercase;}
  .main{margin-left:260px;flex:1;padding:28px;min-height:100vh;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
  .topbar h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--cream);}
  .btn-gold{background:linear-gradient(135deg,#c9a84c,#e8c86e);border:none;color:#0a1a0e;padding:12px 24px;border-radius:10px;font-family:'Crimson Pro',serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,0.3);}
  .filters{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
  .filter-input{background:rgba(13,36,20,0.8);border:1px solid var(--border);border-radius:10px;padding:10px 16px;color:var(--white);font-family:'Crimson Pro',serif;font-size:0.95rem;outline:none;transition:all 0.2s;}
  .filter-input:focus{border-color:var(--gold);}
  .filter-input::placeholder{color:var(--muted);}
  table{width:100%;border-collapse:collapse;}
  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  thead th{padding:14px 20px;text-align:left;color:var(--gold-light);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);}
  tbody tr{border-bottom:1px solid var(--border);transition:background 0.2s;}
  tbody tr:hover{background:rgba(201,168,76,0.04);}
  tbody tr:last-child{border-bottom:none;}
  td{padding:14px 20px;color:var(--cream);font-size:0.9rem;vertical-align:middle;}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;}
  .badge.active{background:rgba(45,110,62,0.3);color:#7eff90;border:1px solid rgba(45,110,62,0.4);}
  .badge.pending{background:rgba(230,126,34,0.3);color:#ffb347;border:1px solid rgba(230,126,34,0.4);}
  .badge.completed{background:rgba(41,128,185,0.3);color:#74b9e7;border:1px solid rgba(41,128,185,0.4);}
  .badge.cancelled{background:rgba(150,150,150,0.3);color:#aaa;border:1px solid rgba(150,150,150,0.4);}
  .animal-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;vertical-align:middle;margin-right:8px;}
  .cert{font-size:0.75rem;color:var(--gold);font-family:monospace;}
  .btn-sm{padding:6px 12px;border-radius:6px;font-size:0.8rem;cursor:pointer;border:none;font-family:'Crimson Pro',serif;transition:all 0.2s;}
  .btn-del{background:rgba(192,57,43,0.2);color:#ff7070;border:1px solid rgba(192,57,43,0.3);}
  .btn-del:hover{background:rgba(192,57,43,0.4);}
  .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:#0d2414;border:1px solid var(--border);border-radius:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
  .modal-head{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#0d2414;}
  .modal-head h3{font-family:'Playfair Display',serif;color:var(--cream);font-size:1.3rem;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;}
  .modal-body{padding:28px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .fg{margin-bottom:16px;}
  .fg label{display:block;color:var(--gold-light);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
  .fg input,.fg select,.fg textarea{width:100%;background:rgba(10,26,14,0.7);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--white);font-family:'Crimson Pro',serif;font-size:0.95rem;outline:none;transition:all 0.2s;}
  .fg input:focus,.fg select:focus{border-color:var(--gold);}
  .modal-foot{padding:20px 28px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end;}
  .btn-cancel{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:12px 24px;border-radius:10px;cursor:pointer;font-family:'Crimson Pro',serif;}
  .btn-save{background:linear-gradient(135deg,#c9a84c,#e8c86e);border:none;color:#0a1a0e;padding:12px 28px;border-radius:10px;font-family:'Crimson Pro',serif;font-weight:600;cursor:pointer;}
  .toast{position:fixed;bottom:30px;right:30px;background:rgba(45,110,62,0.9);border:1px solid rgba(45,110,62,0.6);color:#fff;padding:14px 22px;border-radius:12px;z-index:9999;transition:all 0.3s;transform:translateY(100px);opacity:0;}
  .toast.show{transform:translateY(0);opacity:1;}
  .empty{text-align:center;padding:40px;color:var(--muted);}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><h2>🦁 DIGITAL ZOO</h2><p>Admin System</p></div>
  <nav class="nav">
    <div class="nav-section">Main</div>
    <a href="/dashboard"><span class="icon">📊</span> Dashboard</a>
    <a href="/animals"><span class="icon">🐾</span> Animals</a>
    <a href="/adoptions" class="active"><span class="icon">🤝</span> Adoptions</a>
    <a href="/medications"><span class="icon">💊</span> Medical Records</a>
    <div class="nav-section">Management</div>
    <a href="/reports"><span class="icon">📈</span> Reports</a>
  </nav>
  <div class="sidebar-user">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">A</div>
      <div><div class="user-name" id="userName">Loading...</div><div class="user-role" id="userRole">---</div></div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <h1>🤝 Adoptions Management</h1>
    <button class="btn-gold" onclick="openModal()">+ New Adoption</button>
  </div>
  <div class="filters">
    <input type="text" class="filter-input" id="searchInput" placeholder="🔍 Search adopter or animal..." oninput="load()" style="flex:1;min-width:200px;">
    <select class="filter-input" id="statusFilter" onchange="load()" style="width:160px;">
      <option value="">All Status</option>
      <option value="active">Active</option>
      <option value="pending">Pending</option>
      <option value="completed">Completed</option>
      <option value="cancelled">Cancelled</option>
    </select>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Animal</th><th>Adopter</th><th>Date</th><th>Duration</th><th>Fee</th><th>Certificate</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head"><h3>New Adoption</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="fg"><label>Animal *</label><select id="aAnimal"><option value="">Select animal...</option></select></div>
      <div class="form-row">
        <div class="fg"><label>Adopter Name *</label><input type="text" id="aName" placeholder="Full name"></div>
        <div class="fg"><label>Phone</label><input type="tel" id="aPhone" placeholder="+91-9876543210"></div>
      </div>
      <div class="fg"><label>Email *</label><input type="email" id="aEmail" placeholder="adopter@email.com"></div>
      <div class="fg"><label>Address</label><textarea id="aAddr" placeholder="Full address..." style="min-height:60px;resize:vertical;background:rgba(10,26,14,0.7);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--white);font-family:'Crimson Pro',serif;outline:none;width:100%;"></textarea></div>
      <div class="form-row">
        <div class="fg"><label>Adoption Date *</label><input type="date" id="aDate"></div>
        <div class="fg"><label>Duration (months)</label><input type="number" id="aDur" value="12" min="1"></div>
      </div>
      <div class="fg"><label>Adoption Fee (₹)</label><input type="number" id="aFee" placeholder="5000" step="100"></div>
      <div class="fg"><label>Notes</label><textarea id="aNotes" placeholder="Additional notes..." style="min-height:60px;resize:vertical;background:rgba(10,26,14,0.7);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--white);font-family:'Crimson Pro',serif;outline:none;width:100%;"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveAdoption()">Register Adoption</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const token=localStorage.getItem('token');
const user=JSON.parse(localStorage.getItem('user')||'{}');
if(!token) window.location.href='/login';
document.getElementById('userName').textContent=user.name||'Staff';
document.getElementById('userRole').textContent=user.role||'staff';
document.getElementById('userAvatar').textContent=(user.name||'A')[0].toUpperCase();

async function load(){
  const s=document.getElementById('searchInput').value;
  const st=document.getElementById('statusFilter').value;
  let url='/api/adoptions?limit=50'+(s?'&search='+s:'')+(st?'&status='+st:'');
  try{
    const res=await fetch(url,{headers:{'Authorization':'Bearer '+token}});
    const {data}=await res.json();
    const tb=document.getElementById('tbody');
    if(!data?.length){tb.innerHTML='<tr><td colspan="8" class="empty">No adoptions found</td></tr>';return;}
    tb.innerHTML=data.map(d=>`<tr>
      <td>${d.image_url?`<img class="animal-thumb" src="${d.image_url}" onerror="this.style.display='none'">`:''}${d.animal_name} <span style="color:var(--muted);font-size:0.8rem">(${d.species})</span></td>
      <td><div>${d.adopter_name}</div><div style="color:var(--muted);font-size:0.8rem">${d.adopter_email}</div></td>
      <td>${new Date(d.adoption_date).toLocaleDateString('en-IN')}</td>
      <td>${d.duration_months} months</td>
      <td style="color:var(--gold)">₹${Number(d.adoption_fee||0).toLocaleString('en-IN')}</td>
      <td><div class="cert">${d.certificate_number}</div></td>
      <td><span class="badge ${d.status}">${d.status}</span></td>
      <td><button class="btn-sm btn-del" onclick="delAdoption(${d.id})">🗑</button></td>
    </tr>`).join('');
  }catch(e){console.error(e);}
}

async function loadAnimals(){
  const res=await fetch('/api/animals?limit=100',{headers:{'Authorization':'Bearer '+token}});
  const {data}=await res.json();
  document.getElementById('aAnimal').innerHTML='<option value="">Select animal...</option>'+(data||[]).map(a=>`<option value="${a.id}">${a.name} (${a.species})</option>`).join('');
}

function openModal(){ document.getElementById('modal').classList.add('open'); loadAnimals(); document.getElementById('aDate').valueAsDate=new Date(); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

async function saveAdoption(){
  const body={animal_id:document.getElementById('aAnimal').value,adopter_name:document.getElementById('aName').value,adopter_email:document.getElementById('aEmail').value,adopter_phone:document.getElementById('aPhone').value,adopter_address:document.getElementById('aAddr').value,adoption_date:document.getElementById('aDate').value,adoption_fee:document.getElementById('aFee').value,duration_months:document.getElementById('aDur').value,notes:document.getElementById('aNotes').value};
  if(!body.animal_id||!body.adopter_name||!body.adopter_email||!body.adoption_date){showToast('Required fields missing','error');return;}
  try{
    const res=await fetch('/api/adoptions',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await res.json();
    if(d.success){showToast(`Adoption registered! Certificate: ${d.certificate}`);closeModal();load();}
    else showToast(d.message,'error');
  }catch(e){showToast('Server error','error');}
}

async function delAdoption(id){
  if(!confirm('Delete this adoption record?')) return;
  const res=await fetch('/api/adoptions/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
  const d=await res.json();
  if(d.success){showToast('Adoption deleted');load();}
  else showToast('Failed','error');
}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3500);}
load();
</script>
</body>
</html>
